  function formatSeriesLabel(fmt) {
    if (!fmt) return '';
    var f = fmt.toLowerCase();
    if (f.indexOf('bo5') !== -1) return 'Best-of-5';
    if (f.indexOf('bo7') !== -1) return 'Best-of-7';
    if (f.indexOf('bo3') !== -1) return 'Best-of-3';
    if (f.indexOf('1 game') !== -1 || f.indexOf('single') !== -1) return '1 Game';
    return fmt;
  }

  function openMatchupModal(league, division, roundIdx, matchupIdx) {
    var matchup = getBracketStateMatchup(league, division, roundIdx, matchupIdx);
    if (!matchup) return;

    var leagueForMap = (league === 'Premier') ? 'Premier' : (league === 'Elite') ? 'Elite' : 'NCDC';

    // Get round info
    var divData = BRACKET_STATE && BRACKET_STATE[league] && BRACKET_STATE[league][division];
    var round = divData && divData.rounds && divData.rounds[roundIdx];
    var roundName = round ? round.roundName : '';
    var roundFormat = round ? round.format : '';

    var html = '';

    // --- Series Header ---
    html += '<div class="modal-series-header">';

    // Round info line
    if (roundName) {
      html += '<div class="modal-round-info">';
      html += roundName;
      if (roundFormat) html += ' &mdash; ' + formatSeriesLabel(roundFormat);
      html += '</div>';
    }

    // Teams row with logos
    html += '<div class="modal-teams-row">';

    // Home team
    html += '<div class="modal-team">';
    var homeInfo = getTeamInfo(matchup.homeTeamName, leagueForMap);
    if (homeInfo && homeInfo.logo_url) {
      html += '<img src="' + homeInfo.logo_url + '" class="modal-team-logo" onerror="this.style.display=\'none\'" alt="">';

    if (matchup.homeSeed) {
      html += '<div class="modal-team-seed">#' + matchup.homeSeed + ' Seed</div>';
    }
    html += '<div class="modal-team-name">' + (matchup.homeTeamName || 'TBD') + '</div>';
    html += '</div>';

    // VS
    html += '<div class="modal-vs">vs</div>';

    // Away team
    html += '<div class="modal-team">';
    var awayInfo = getTeamInfo(matchup.awayTeamName, leagueForMap);
    if (awayInfo && awayInfo.logo_url) {
      html += '<img src="' + awayInfo.logo_url + '" class="modal-team-logo" onerror="this.style.display=\'none\'" alt="">';
    }
    if (matchup.awaySeed) {
      html += '<div class="modal-team-seed">#' + matchup.awaySeed + ' Seed</div>';

    html += '<div class="modal-team-name">' + (matchup.awayTeamName || 'TBD') + '</div>';

      html += '<div class="modal-series-score">';
      html += '<span class="modal-wins-num' + (hw > aw ? ' leading' : '') + '">' + hw + '</span>';
      html += '<span class="modal-wins-dash">&ndash;</span>';
      html += '<span class="modal-wins-num' + (aw > hw ? ' leading' : '') + '">' + aw + '</span>';
      html += '</div>';
    }

    // Series status text
    var seriesObj = {
      home: matchup.homeTeamName,
      away: matchup.awayTeamName,
      homeWins: hw,
      awayWins: aw,
      winsNeeded: getWinsNeededFromFormat(roundFormat),
      status: matchup.status,
      seriesSummary: matchup.seriesSummary || ''
    };

    if (statusText) {

    }

    html += '</div>'; // end modal-series-header

    // --- Games List ---
    var games = matchup.games || [];

      html += '<div class="modal-games-title">Schedule</div>';
      var sortedGames = games.slice().sort(function(a, b) {
        return (a.date || '').localeCompare(b.date || '');
      });
      sortedGames.forEach(function(g) {

        html += '</div>';
      });
    } else {
      // No games — show schedule info if available
      if (round && round.scheduleInfo) {
        html += '<div class="modal-games-title">Schedule</div>';
        html += '<div class="modal-schedule-info">' + round.scheduleInfo + '</div>';

      html += '<div class="modal-schedule-note">' + matchup.seriesNote + '</div>';

    matchupModalBody.innerHTML = html;

    matchupModalEl.style.display = 'flex';
    matchupModalEl.offsetHeight; // force reflow for transition
    matchupModalEl.classList.add('visible');
    document.body.style.overflow = 'hidden';

  // --- Event Delegation: bracket matchup clicks ---
  bracketContent.addEventListener('click', function(e) {
    // Don't open modal if user clicked a team profile link
    if (e.target.closest('a.team-link')) return;
    var matchupEl = e.target.closest('.matchup.clickable');
    if (!matchupEl) return;
    var league = matchupEl.getAttribute('data-league');
    var division = matchupEl.getAttribute('data-division');
    var roundIdx = parseInt(matchupEl.getAttribute('data-round'), 10);
    var matchupIdx = parseInt(matchupEl.getAttribute('data-matchup'), 10);
    if (league && division && !isNaN(roundIdx) && !isNaN(matchupIdx)) {
      openMatchupModal(league, division, roundIdx, matchupIdx);
    }
  });

  // --- Close modal handlers ---
  matchupModalCloseBtn.addEventListener('click', closeMatchupModal);
  matchupModalEl.addEventListener('click', function(e) {
    if (e.target === matchupModalEl) closeMatchupModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && matchupModalEl.style.display !== 'none') closeMatchupModal();
  });

  // ===========================================================================
  // AUTO-REFRESH (every 5 minutes when tab is visible)
  // ===========================================================================
  var refreshInterval = null;

  // Finished leagues don't need live polling
  var FINISHED_LEAGUES = ['Elite', 'Premier'];

  function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    // Don't poll if viewing a finished league
    if (FINISHED_LEAGUES.indexOf(currentLeague) !== -1) return;
    // In cross-origin iframes, document.hidden may not reflect parent page
    // visibility accurately, so always refresh regardless
    refreshInterval = setInterval(function() {
      refreshGameData();
    }, 5 * 60 * 1000);
  }

  async function refreshGameData() {
    try {
      var resp = await fetch(API_BASE + '/api/bracket-state');
      if (!resp.ok) return;
      var newState = await resp.json();
      BRACKET_STATE = newState;
      if (BRACKET_STATE._lastUpdated) {
        lastUpdated = new Date(BRACKET_STATE._lastUpdated);
        updateLastUpdatedUI();
      }
      // Re-render current view
      renderAll();
    } catch(e) {
      console.warn('Auto-refresh failed:', e.message);
    }
  }

  // ===========================================================================
  // RESIZE OBSERVER FOR IFRAME HEIGHT
  // ===========================================================================
  (function() {
    if (typeof ResizeObserver === 'undefined') return;
    var ro = new ResizeObserver(function() {
      var height = document.documentElement.scrollHeight;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'resize', height: height }, '*');
      }
    });
    ro.observe(document.documentElement);
  })();

  // ===========================================================================
  // INITIALIZE
  // ===========================================================================
  (function init() {
    // Parse URL params for per-league widget mode
    var params = new URLSearchParams(window.location.search);
    var leagueParam = params.get("league");
    var divisionParam = params.get("division");

    // Set league from URL param or default to NCDC
    if (leagueParam && DIVISIONS[leagueParam]) {
      currentLeague = leagueParam;
      // Hide league tabs in single-league widget mode
      document.querySelector(".league-tabs").style.display = "none";
    } else {
      currentLeague = "NCDC";
    }

    // Set division from URL param or default to first in league
    if (divisionParam && DIVISIONS[currentLeague].indexOf(divisionParam) !== -1) {
      currentDivision = divisionParam;
    } else {
      currentDivision = DIVISIONS[currentLeague][0];
    }

    // Sync league tab active state
    tabButtons.forEach(function(b) {
      if (b.getAttribute("data-league") === currentLeague) b.classList.add("active");
      else b.classList.remove("active");
    });

    // Update heading based on active league
    updateHeading(currentLeague);

    // Default to Nationals tab for Elite/Premier if no division specified
    if (!divisionParam && (currentLeague === 'Elite' || currentLeague === 'Premier')) {
      if (DIVISIONS[currentLeague].indexOf('Nationals') !== -1) {
        currentDivision = 'Nationals';
      }
    }

    // Default to Dineen Cup Finals tab for NCDC if no division specified
    if (!divisionParam && currentLeague === 'NCDC') {
      if (DIVISIONS[currentLeague].indexOf('Dineen Cup Finals') !== -1) {
        currentDivision = 'Dineen Cup Finals';
      }
    }

    populateDivisionPills(currentLeague);
    highlightActivePill();
    loadData().then(function() {
      startAutoRefresh();
    });
  })();
  </script>
</body>
</html>
