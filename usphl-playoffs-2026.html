<head>
  <meta charset="UTF-8">

  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    header {
      background: #22223a;
      text-align: center;
      padding: 1.25rem 1rem;
      border-bottom: 2px solid #e94560;
    }

    header h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* ===== Main Content Wrapper ===== */
    .content-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ===== League Tabs ===== */
    .league-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 0;
    }

    .league-tab {
      background: transparent;
      color: #eee;
      border: 2px solid rgba(233, 69, 96, 0.35);
      border-radius: 6px;
      padding: 0.55rem 1.6rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s;
    }

    .league-tab:hover {
      opacity: 0.8;
    }

    .league-tab.active {
      background: #e94560;
      border-color: #e94560;
      opacity: 1;
    }

    /* ===== Division Pills ===== */
    .division-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.25rem 0 1rem;
      overflow-x: auto;
    }

    .division-pill {
      background: transparent;
      color: #ccc;
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 20px;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s, color 0.2s;
    }

    .division-pill:hover {
      border-color: rgba(233, 69, 96, 0.6);
      color: #eee;
    }

    .division-pill.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    /* ===== Section Containers ===== */
    .standings-container,
    .bracket-container,
    .schedule-container {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #e94560;
      color: #eee;
    }

    .placeholder-msg {
      color: #888;
      font-style: italic;
      padding: 1rem 0;
    }

    /* ===== Tables (Standings & Schedule) ===== */
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    table.data-table thead th {
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      color: #bbb;
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 2px solid #e94560;
    }

    table.data-table tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    table.data-table tbody tr:nth-child(odd) {
      background: rgba(255, 255, 255, 0.03);
    }

    table.data-table tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.06);
    }

    table.data-table tbody td {
      padding: 0.55rem 0.75rem;
    }

    /* Qualified row: subtle green left border */
    table.data-table tbody tr.qualified {
      border-left: 3px solid #2ecc71;
    }

    /* Eliminated row: dimmed */
    table.data-table tbody tr.eliminated {
      opacity: 0.4;
    }

    /* ===== Bracket Container ===== */
    .bracket-container {
      /* Structural CSS for CSS-grid brackets will be added in later tasks */
    }

    /* ===== "If Necessary" styling ===== */
    .if-necessary {
      font-style: italic;
      opacity: 0.6;
    }

    /* ===== Print Media Query ===== */
    @media print {
      body {
        background: #fff;
        color: #000;
      }

      header {
        background: #fff;
        border-bottom-color: #333;
      }

      header h1 {
        color: #000;
      }

      .league-tabs,
      .division-pills {
        display: none;
      }

      table.data-table thead th {
        color: #333;
        border-bottom-color: #333;
      }

      table.data-table tbody tr:nth-child(odd) {
        background: #f5f5f5;
      }

      table.data-table tbody tr:nth-child(even) {
        background: #fff;
      }

      table.data-table tbody tr.qualified {
        border-left-color: #2ecc71;
      }
    }

    /* ===== Bracket Layout ===== */
    .bracket {
      display: flex;
      gap: 2rem;
      overflow-x: auto;
      padding: 1rem 0;
      min-height: 200px;
      align-items: stretch;
    }

    .round {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      min-width: 220px;
      gap: 0.75rem;
    }

    .round-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #e94560;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .matchup {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      position: relative;
    }

    .matchup-team {
      padding: 0.35rem 0;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
    }

    .matchup-team.home {
      border-left: 3px solid #2ecc71;
      padding-left: 0.5rem;
    }

    .matchup-seed {
      color: #888;
      font-size: 0.75rem;
      margin-right: 0.4rem;
    }

    .matchup-vs {
      text-align: center;
      font-size: 0.65rem;
      color: #666;
      text-transform: uppercase;
      padding: 0.1rem 0;
    }

    .matchup-bye {
      color: #666;
      font-style: italic;
      font-size: 0.8rem;
      padding: 0.35rem 0;
    }

    .matchup-label {
      font-size: 0.7rem;
      color: #888;
      text-align: center;
      margin-top: 0.25rem;
    }

    .series-label {
      font-size: 0.65rem;
      color: #e94560;
      text-align: center;
      opacity: 0.8;
    }

    .pod-label {
      font-size: 0.8rem;
      color: #e94560;
      font-weight: 600;
      text-align: center;
      margin: 0.5rem 0 0.25rem;
    }

    /* Bracket bye entry */
    .bracket-bye-entry {
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      text-align: center;
    }

    .bracket-bye-entry .matchup-team {
      justify-content: center;
    }

    .bracket-bye-tag {
      font-size: 0.65rem;
      color: #2ecc71;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 0.3rem;
    }

    /* Dineen Cup special styling */
    .dineen-schedule {
      max-width: 700px;
    }

    .dineen-game {
      display: flex;
      gap: 1rem;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      align-items: center;
    }

    .dineen-game-num {
      font-weight: 700;
      color: #e94560;
      min-width: 60px;
    }

    .dineen-game-date {
      color: #aaa;
      min-width: 140px;
      font-size: 0.85rem;
    }

    .dineen-game-matchup {
      flex: 1;
      font-size: 0.9rem;
    }

    .dineen-game-note {
      font-size: 0.75rem;
      color: #888;
      font-style: italic;
    }

    /* NE Conference combined view */
    .ne-divisions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .ne-division-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 1rem;
    }

    .ne-division-card h3 {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      color: #e94560;
    }

    /* Bracket section divider */
    .bracket-section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e94560;
      margin: 1.5rem 0 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
    }

    /* Pod bracket wrapper for Northwest */
    .pod-brackets {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .pod-bracket-section {
      flex: 1;
      min-width: 250px;
    }

    /* Schedule info box */
    .schedule-info {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .schedule-info p {
      margin: 0.3rem 0;
      font-size: 0.88rem;
      color: #ccc;
    }

    .schedule-round-label {
      color: #e94560;
      font-weight: 600;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      header h1 {
        font-size: 1.2rem;
      }

      .league-tab {
        padding: 0.45rem 1rem;
        font-size: 0.85rem;
      }

      .division-pills {
        flex-wrap: wrap;
        justify-content: center;
      }

      table.data-table {
        font-size: 0.78rem;
      }

      table.data-table thead th,
      table.data-table tbody td {
        padding: 0.4rem 0.5rem;
      }
    }
  </style>
</head>

    };
  </script>

  <!-- ===== RENDERING LOGIC ===== -->
  <script>
    // ---- Division definitions per league ----
    const DIVISIONS = {
      NCDC: [
        "Atlantic",
        "NE Central",
        "NE East",
        "NE North",
        "NE Conference",
        "Mountain",
        "Dineen Cup"
      ],
      Premier: [
        "Atlantic",
        "Florida",
        "Great Lakes",
        "Midwest",
        "New England",
        "North",
        "Northwest",
        "Pacific",
        "Southeast",
        "St. Lawrence"
      ],
      Elite: [
        "Atlantic",
        "Florida",
        "Midwest",
        "New England",
        "Southeast"
      ]
    };

    // ---- State ----
    let currentLeague = "NCDC";
    let currentDivision = "Atlantic";

    // ---- DOM References ----
    const tabButtons = document.querySelectorAll(".league-tab");
    const pillContainer = document.getElementById("divisionPills");
    const standingsContent = document.getElementById("standingsContent");
    const bracketContent = document.getElementById("bracketContent");
    const scheduleContent = document.getElementById("scheduleContent");

    // ---- Tab Switching ----
    tabButtons.forEach(function(btn) {
      btn.addEventListener("click", function() {
        var league = btn.getAttribute("data-league");
        if (league === currentLeague) return;

        // Update active tab
        tabButtons.forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");

        currentLeague = league;

        // Populate division pills, select first division
        populateDivisionPills(league);
        currentDivision = DIVISIONS[league][0];
        highlightActivePill();

        renderAll();
      });
    });

    // ---- Division Pills ----
    function populateDivisionPills(league) {
      var divisions = DIVISIONS[league];

      // Clear existing pills using DOM methods
      while (pillContainer.firstChild) {
        pillContainer.removeChild(pillContainer.firstChild);
      }

      divisions.forEach(function(div) {
        var pill = document.createElement("button");
        pill.className = "division-pill";
        pill.textContent = div;
        pill.setAttribute("data-division", div);

        pill.addEventListener("click", function() {
          currentDivision = div;
          highlightActivePill();
          renderAll();
        });

        pillContainer.appendChild(pill);
      });
    }

    function highlightActivePill() {
      var pills = pillContainer.querySelectorAll(".division-pill");
      pills.forEach(function(p) {
        if (p.getAttribute("data-division") === currentDivision) {
          p.classList.add("active");
        } else {
          p.classList.remove("active");
        }
      });
    }

    // ---- Data Helper ----
    function getDivisionData() {
      if (currentLeague === "Premier") {
        return LEAGUE_DATA.premier[currentDivision] || null;
      }
      if (currentLeague === "Elite") {
        return LEAGUE_DATA.elite[currentDivision] || null;
      }
      if (currentLeague === "NCDC") {
        if (currentDivision === "Atlantic") return LEAGUE_DATA.ncdc.conferences["Atlantic"];
        if (currentDivision === "Mountain") return LEAGUE_DATA.ncdc.conferences["Mountain"];
        if (currentDivision === "NE Central") return LEAGUE_DATA.ncdc.conferences["New England"].divisions["Central"];
        if (currentDivision === "NE East") return LEAGUE_DATA.ncdc.conferences["New England"].divisions["East"];
        if (currentDivision === "NE North") return LEAGUE_DATA.ncdc.conferences["New England"].divisions["North"];
        if (currentDivision === "NE Conference") return { _special: "ne_conference" };
        if (currentDivision === "Dineen Cup") return { _special: "dineen_cup" };
      }
      return null;
    }

    // Helper: get all teams for a division (handles pods for Northwest)
    function getAllTeams(data) {
      if (!data) return [];
      if (data.pods) {
        var all = [];
        Object.keys(data.pods).forEach(function(podName) {
          data.pods[podName].teams.forEach(function(t) {
            all.push(Object.assign({}, t, { pod: podName }));
          });
        });
        return all;
      }
      return data.teams || [];
    }

    // Helper: find a team by seed from teams + eliminated arrays
    function findTeamBySeed(data, seed) {
      if (!data) return null;
      var teams = getAllTeams(data);
      var eliminated = data.eliminated || [];
      var all = teams.concat(eliminated);
      for (var i = 0; i < all.length; i++) {
        if (all[i].seed === seed) return all[i];
      }
      return null;
    }

    // Helper: get team name by seed or label
    function getTeamLabel(data, seedOrLabel) {
      if (typeof seedOrLabel === "number") {
        var team = findTeamBySeed(data, seedOrLabel);
        return team ? team.name : "Seed #" + seedOrLabel;
      }
      return String(seedOrLabel);
    }

    // Helper: extract series format from round name or division format
    function getSeriesFormat(round, divFormat) {
      // Check if round name contains format info like "Bo3" or "Bo5"
      var match = round.name.match(/\(Bo\d\)/);
      if (match) return match[0].replace(/[()]/g, "");
      // Fall back to division's seriesFormat
      return divFormat || "";
    }

    // ---- Render Standings ----
    function renderStandings() {
      standingsContent.className = "";
      var data = getDivisionData();

      if (!data) {
        standingsContent.innerHTML = '<p class="placeholder-msg">No data available.</p>';
        return;
      }

      // Special: Dineen Cup
      if (data._special === "dineen_cup") {
        renderDineenStandings();
        return;
      }

      // Special: NE Conference
      if (data._special === "ne_conference") {
        renderNEConferenceStandings();
        return;
      }

      // Northwest with pods
      if (data.pods) {
        renderPodStandings(data);
        return;
      }

      // Standard standings table
      var teams = data.teams || [];
      var eliminated = data.eliminated || [];
      var qualifyCount = data.qualifyCount || 0;

      standingsContent.innerHTML = buildStandingsTable(teams, eliminated, qualifyCount);
    }

    function buildStandingsTable(teams, eliminated, qualifyCount, opts) {
      opts = opts || {};
      var html = '<table class="data-table"><thead><tr>';
      html += '<th>Seed</th><th>Team</th><th>GP</th><th>PTS</th><th>ROW</th><th>L</th><th>PTS%</th>';
      html += '</tr></thead><tbody>';

      teams.forEach(function(team) {
        var rowClass = team.seed <= qualifyCount ? "qualified" : "";
        html += '<tr class="' + rowClass + '">';
        html += '<td>' + team.seed + '</td>';
        html += '<td>' + (opts.podLabel && team.pod ? '<span style="color:#888;font-size:0.75rem;">[' + team.pod + ']</span> ' : '') + team.name + '</td>';
        html += '<td>' + team.gp + '</td>';
        html += '<td>' + team.pts + '</td>';
        html += '<td>' + team.row + '</td>';
        html += '<td>' + team.l + '</td>';
        html += '<td>' + team.pctg.toFixed(3) + '</td>';
        html += '</tr>';
      });

      eliminated.forEach(function(team) {
        html += '<tr class="eliminated">';
        html += '<td>' + team.seed + '</td>';
        html += '<td>' + team.name + '</td>';
        html += '<td>' + team.gp + '</td>';
        html += '<td>' + team.pts + '</td>';
        html += '<td>' + team.row + '</td>';
        html += '<td>' + team.l + '</td>';
        html += '<td>' + team.pctg.toFixed(3) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    function renderPodStandings(data) {
      var html = '';
      var podNames = Object.keys(data.pods);

      // Combine all pod teams with pod labels, then add eliminated
      var allTeams = [];
      podNames.forEach(function(podName) {
        data.pods[podName].teams.forEach(function(t) {
          allTeams.push(Object.assign({}, t, { pod: podName }));
        });
      });
      // Sort by seed (pod teams have seeds relative to their pod, we need to re-number)
      // Show by pod grouping instead
      podNames.forEach(function(podName) {
        html += '<div class="pod-label">' + podName + ' Pod</div>';
        html += '<table class="data-table"><thead><tr>';
        html += '<th>Seed</th><th>Team</th><th>GP</th><th>PTS</th><th>ROW</th><th>L</th><th>PTS%</th>';
        html += '</tr></thead><tbody>';

        data.pods[podName].teams.forEach(function(team) {
          html += '<tr class="qualified">';
          html += '<td>' + team.seed + '</td>';
          html += '<td>' + team.name + '</td>';
          html += '<td>' + team.gp + '</td>';
          html += '<td>' + team.pts + '</td>';
          html += '<td>' + team.row + '</td>';
          html += '<td>' + team.l + '</td>';
          html += '<td>' + team.pctg.toFixed(3) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table>';
      });

      if (data.eliminated && data.eliminated.length > 0) {
        html += '<div class="pod-label" style="color:#888;">Eliminated</div>';
        html += '<table class="data-table"><thead><tr>';
        html += '<th>Seed</th><th>Team</th><th>GP</th><th>PTS</th><th>ROW</th><th>L</th><th>PTS%</th>';
        html += '</tr></thead><tbody>';
        data.eliminated.forEach(function(team) {
          html += '<tr class="eliminated">';
          html += '<td>' + team.seed + '</td>';
          html += '<td>' + team.name + '</td>';
          html += '<td>' + team.gp + '</td>';
          html += '<td>' + team.pts + '</td>';
          html += '<td>' + team.row + '</td>';
          html += '<td>' + team.l + '</td>';
          html += '<td>' + team.pctg.toFixed(3) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table>';
      }

      standingsContent.innerHTML = html;
    }

    function renderNEConferenceStandings() {
      var ne = LEAGUE_DATA.ncdc.conferences["New England"];
      var divNames = ["Central", "East", "North"];
      var html = '<div class="ne-divisions-grid">';

      divNames.forEach(function(divName) {
        var div = ne.divisions[divName];

        div.teams.forEach(function(team) {

          html += '<tr class="' + rowClass + '">';

    function renderDineenStandings() {
      var dc = LEAGUE_DATA.ncdc.dineenCup;

        html += '<tr><td>' + (idx + 1) + '</td><td>' + entry + '</td><td style="color:#888;font-size:0.85rem;">' + note + '</td></tr>';

    // ---- Render Bracket ----
    function renderBracket() {
      bracketContent.className = "";
      var data = getDivisionData();

      if (!data) {
        bracketContent.innerHTML = '<p class="placeholder-msg">No data available.</p>';
        return;
      }

      // Special: Dineen Cup
      if (data._special === "dineen_cup") {
        renderDineenBracket();
        return;
      }

      // Special: NE Conference
      if (data._special === "ne_conference") {
        renderNEConferenceBracket();
        return;
      }

      // Northwest with pods
      if (data.pods) {
        renderPodBracket(data);
        return;
      }

      // Standard bracket
      if (!data.playoffFormat || !data.playoffFormat.rounds) {
        bracketContent.innerHTML = '<p class="placeholder-msg">No playoff format data.</p>';
        return;
      }

      bracketContent.innerHTML = buildBracketHTML(data, data.playoffFormat);
    }

    function buildBracketHTML(data, format) {
      var rounds = format.rounds;
      var seriesFormat = format.seriesFormat || "";
      var html = '<div class="bracket">';

      rounds.forEach(function(round, roundIdx) {
        var roundSeriesFormat = getSeriesFormat(round, seriesFormat);
        // Override series format for play-in rounds that have a special format (e.g. single game)
        if (format.playInFormat && round.name.indexOf("Play-In") !== -1) {
          roundSeriesFormat = format.playInFormat;
        }
        html += '<div class="round">';
        html += '<div class="round-title">' + round.name;
        if (roundSeriesFormat && round.name.indexOf("Bo") === -1) {
          html += ' <span class="series-label">(' + roundSeriesFormat + ')</span>';
        }
        html += '</div>';

        // Show byes as advancing entries
        if (round.byes && round.byes.length > 0) {
          round.byes.forEach(function(byeSeed) {
            var teamName = getTeamLabel(data, byeSeed);
            html += '<div class="bracket-bye-entry">';
            html += '<div class="matchup-team">';
            html += '<span><span class="matchup-seed">#' + byeSeed + '</span> ' + teamName + '</span>';
            html += '<span class="bracket-bye-tag">BYE</span>';
            html += '</div></div>';
          });
        }

        // Show matchups
        round.matchups.forEach(function(matchup) {
          var homeSeed = matchup[0];
          var awaySeed = matchup[1];
          var homeLabel, awayLabel;

          if (typeof homeSeed === "number") {
            var homeTeam = findTeamBySeed(data, homeSeed);
            homeLabel = '<span class="matchup-seed">#' + homeSeed + '</span> ' + (homeTeam ? homeTeam.name : "TBD");
          } else {
            homeLabel = String(homeSeed);
          }

          if (typeof awaySeed === "number") {
            var awayTeam = findTeamBySeed(data, awaySeed);
            awayLabel = '<span class="matchup-seed">#' + awaySeed + '</span> ' + (awayTeam ? awayTeam.name : "TBD");
          } else {
            awayLabel = String(awaySeed);
          }

          html += '<div class="matchup">';
          html += '<div class="matchup-team home">' + homeLabel + '</div>';
          html += '<div class="matchup-vs">vs</div>';
          html += '<div class="matchup-team away">' + awayLabel + '</div>';
          if (round.note) {
            html += '<div class="matchup-label">' + round.note + '</div>';
          }
          html += '</div>';
        });

        html += '</div>';
      });

      html += '</div>';
      return html;
    }

    function renderNEConferenceBracket() {
      var ne = LEAGUE_DATA.ncdc.conferences["New England"];

    // ---- Render Schedule ----
    function renderSchedule() {
      scheduleContent.className = "";
      var data = getDivisionData();

      if (!data) {
        scheduleContent.innerHTML = '<p class="placeholder-msg">No data available.</p>';
        return;
      }

      // Special: Dineen Cup
      if (data._special === "dineen_cup") {
        renderDineenSchedule();
        return;
      }

      // Special: NE Conference
      if (data._special === "ne_conference") {
        renderNEConferenceSchedule();
        return;
      }

      // Standard schedule: show round structure
      if (!data.playoffFormat || !data.playoffFormat.rounds) {
        scheduleContent.innerHTML = '<p class="placeholder-msg">No schedule data available.</p>';
        return;
      }

      var format = data.playoffFormat;
      var rounds = format.rounds;
      var seriesFormat = format.seriesFormat || "";
      var html = '';

      // Show schedule table with round info
      html += '<table class="data-table"><thead><tr>';
      html += '<th>Round</th><th>Format</th><th>Matchups</th><th>Notes</th>';
      html += '</tr></thead><tbody>';

      rounds.forEach(function(round) {
        var roundFormat = getSeriesFormat(round, seriesFormat);
        // Override format for play-in rounds with special format
        if (format.playInFormat && round.name.indexOf("Play-In") !== -1) {
          roundFormat = format.playInFormat;
        }
        var matchupDescs = [];

        // Handle byes
        if (round.byes && round.byes.length > 0) {
          round.byes.forEach(function(byeSeed) {
            var teamName = getTeamLabel(data, byeSeed);
            matchupDescs.push("#" + byeSeed + " " + teamName + " (BYE)");
          });
        }

        // Handle matchups
        round.matchups.forEach(function(matchup) {
          var home, away;
          if (typeof matchup[0] === "number") {
            home = "#" + matchup[0] + " " + getTeamLabel(data, matchup[0]);
          } else {
            home = String(matchup[0]);
          }
          if (typeof matchup[1] === "number") {
            away = "#" + matchup[1] + " " + getTeamLabel(data, matchup[1]);
          } else {
            away = String(matchup[1]);
          }
          matchupDescs.push(home + " vs " + away);
        });

        var notes = [];
        if (round.note) notes.push(round.note);

        html += '<tr>';
        html += '<td><span class="schedule-round-label">' + round.name + '</span></td>';
        html += '<td>' + roundFormat + '</td>';
        html += '<td>' + matchupDescs.join('<br>') + '</td>';
        html += '<td style="color:#888;font-size:0.85rem;">' + (notes.length > 0 ? notes.join('; ') : 'Dates TBD') + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      scheduleContent.innerHTML = html;
    }

    function renderDineenSchedule() {
      var dc = LEAGUE_DATA.ncdc.dineenCup;
      var html = '<div class="dineen-schedule">';
      html += '<div class="schedule-info">';
      html += '<p><strong>' + dc.name + '</strong> &mdash; ' + dc.dates + '</p>';
      html += '<p>Format: ' + dc.format + '</p>';
      html += '</div>';

      dc.schedule.forEach(function(g) {
        html += '<div class="dineen-game">';
        html += '<div class="dineen-game-num">Game ' + g.game + '</div>';
        html += '<div class="dineen-game-date">' + g.date + (g.time ? ', ' + g.time : '') + '</div>';
        html += '<div class="dineen-game-matchup">' + g.matchup + '</div>';
        if (g.note) {
          html += '<div class="dineen-game-note">' + g.note + '</div>';
        }
        html += '</div>';
      });

      html += '</div>';
      scheduleContent.innerHTML = html;
    }

    function renderNEConferenceSchedule() {
      var ne = LEAGUE_DATA.ncdc.conferences["New England"];
      var divNames = ["Central", "East", "North"];
      var html = '';

      // Division playoff schedules
      html += '<div class="bracket-section-title">Division Playoffs</div>';
      html += '<table class="data-table"><thead><tr>';
      html += '<th>Division</th><th>Round</th><th>Format</th><th>Matchups</th>';
      html += '</tr></thead><tbody>';

      divNames.forEach(function(divName) {
        var div = ne.divisions[divName];
        var format = div.playoffFormat;
        format.rounds.forEach(function(round) {
          var roundFormat = getSeriesFormat(round, format.seriesFormat);
          var matchupDescs = [];
          round.matchups.forEach(function(matchup) {
            var home, away;
            if (typeof matchup[0] === "number") {
              home = "#" + matchup[0] + " " + getTeamLabel(div, matchup[0]);
            } else {
              home = String(matchup[0]);
            }
            if (typeof matchup[1] === "number") {
              away = "#" + matchup[1] + " " + getTeamLabel(div, matchup[1]);
            } else {
              away = String(matchup[1]);
            }
            matchupDescs.push(home + " vs " + away);
          });

          html += '<tr>';
          html += '<td>NE ' + divName + '</td>';
          html += '<td><span class="schedule-round-label">' + round.name + '</span></td>';
          html += '<td>' + roundFormat + '</td>';
          html += '<td>' + matchupDescs.join('<br>') + '</td>';
          html += '</tr>';
        });
      });

      html += '</tbody></table>';

      // Conference Rounds
      var rr = ne.conferenceRounds.roundRobin;
      html += '<div class="bracket-section-title">' + rr.name + '</div>';
      html += '<div class="schedule-info">';
      html += '<p>Dates: ' + rr.dates + '</p>';
      html += '<p>Format: ' + rr.format + ' &mdash; 3 division winners</p>';
      if (rr.note) html += '<p>' + rr.note + '</p>';
      html += '</div>';

      html += '<table class="data-table"><thead><tr>';
      html += '<th>Game</th><th>Matchup</th>';
      html += '</tr></thead><tbody>';
      rr.matchups.forEach(function(matchup, idx) {
        html += '<tr><td>Game ' + (idx + 1) + '</td><td>' + matchup[0] + ' vs ' + matchup[1] + '</td></tr>';
      });
      html += '</tbody></table>';

      var cf = ne.conferenceRounds.conferenceFinal;
      html += '<div class="bracket-section-title">' + cf.name + '</div>';
      html += '<div class="schedule-info">';
      html += '<p>Dates: ' + cf.dates + '</p>';
      html += '<p>Format: ' + cf.format + ' &mdash; Top 2 from Round Robin</p>';
      if (cf.note) html += '<p>' + cf.note + '</p>';
      html += '</div>';

      scheduleContent.innerHTML = html;
    }

    // ---- Render All ----
    function renderAll() {
      renderStandings();
      renderBracket();
      renderSchedule();
    }

    // ---- Initialize on page load ----
    (function init() {
      currentLeague = "NCDC";
      currentDivision = "Atlantic";
      populateDivisionPills(currentLeague);
      highlightActivePill();
      renderAll();
    })();
  </script>

</body>
</html>
